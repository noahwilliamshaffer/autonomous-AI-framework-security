name: Bug Report
description: Report a bug in RedAmon
title: "[Bug] "
labels: ["bug"]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of RedAmon is affected?
      options:
        - webapp (Next.js frontend)
        - recon-orchestrator (Python backend)
        - agent (AI agent)
        - kali-sandbox / MCP servers
        - Docker / infrastructure
        - other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: What went wrong?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Start the stack with `docker compose up -d`
        2. Navigate to ...
        3. Click on ...
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Your setup details.
      placeholder: |
        - OS: Ubuntu 22.04
        - Docker: 24.0.7
        - Docker Compose: v2.23.0
        - Browser (if relevant): Chrome 120
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: "Relevant container logs. Run: `docker compose logs <service>`"
      render: shell
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem.
    validations:
      required: false
